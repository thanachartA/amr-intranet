<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMR Asia - Intranet Portal</title>
  <style>
    body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;background:#f0f4f8}
    .loader{text-align:center;color:#1e40af}
    .spinner{width:48px;height:48px;border:4px solid #dbeafe;border-top-color:#1e40af;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading AMR Asia Intranet Portal...</p>
  </div>
  <script>
    fetch("https://pxcgnhxtmgujjwboribv.supabase.co/functions/v1/intranet")
      .then(r => r.text())
      .then(html => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(e => {
        document.querySelector(".loader").innerHTML =
          "<p style=\"color:red\">Error loading portal: " + e.message + "</p>" +
          "<p><a href=\"https://pxcgnhxtmgujjwboribv.supabase.co/functions/v1/intranet\">Try direct link</a></p>";
      });
  </script>
</body>
</html>
