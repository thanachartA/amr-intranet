<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMR Asia Intranet</title>
  <style>
    body{margin:0;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f4f8}
    .loader{text-align:center}
    .spinner{width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{color:#dc2626;max-width:400px}
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading AMR Asia Intranet...</p>
  </div>
  <script>
    fetch("https://pxcgnhxtmgujjwboribv.supabase.co/functions/v1/intranet")
      .then(function(r){return r.text()})
      .then(function(html){
        document.open();
        document.write(html);
        document.close();
      })
      .catch(function(e){
        document.getElementById("loader").innerHTML="<div class=error><h2>Connection Error</h2><p>"+e.message+"</p></div>";
      });
  </script>
</body>
</html>
